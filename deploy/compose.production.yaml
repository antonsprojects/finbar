# Plaats .env in de reporoot (naast deploy/); start o.a.:
#   docker compose --env-file /opt/finbar/.env -f deploy/compose.production.yaml up -d
#
# Publishe: standaard 127.0.0.1:8080 (alleen op de host) — reverse proxy draait in *ander* compose
# (Diverse Nginx) en verbindt via gedeeld extern netwerk `finbar_edge` → http://finbar-app:3001
# (niet host.docker.internal; dat geeft op veel Linux-vps'en timeouts). Eénmalig op de server:
#   docker network create finbar_edge
# Diverse: nginx-service op netwerk `finbar_edge` zetten, zie deploy-stappen in de repo/PR-beschrijving.

services:
  finbar:
    image: ${FINBAR_IMAGE}
    container_name: finbar-app
    restart: unless-stopped
    # Relatief aan dit bestand (deploy/): reporoot .env, niet deploy/.env
    env_file:
      - ../.env
    ports:
      - "127.0.0.1:${FINBAR_PUBLISH_PORT:-8080}:3001"
    networks:
      - default
      - finbar_edge
    depends_on:
      postgres:
        condition: service_healthy
    # Healthcheck: poort 3001 in container
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://127.0.0.1:3001/health',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s

  postgres:
    image: postgres:16-alpine
    container_name: finbar-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-finbar}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-finbar}
    volumes:
      - finbar_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-finbar} -d ${POSTGRES_DB:-finbar}"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  finbar_pgdata:

# Eén gedeeld netwerk met Diverse-nginx: `docker network create finbar_edge` (vóór `compose up`)
networks:
  finbar_edge:
    name: finbar_edge
    external: true
