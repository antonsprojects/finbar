services:
  postgres:
    image: postgres:16-alpine
    container_name: finbar-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: finbar
      POSTGRES_PASSWORD: finbar
      POSTGRES_DB: finbar
    volumes:
      - finbar_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U finbar -d finbar"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  finbar_pgdata:
