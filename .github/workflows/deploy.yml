# Bouwt Docker-image, pusht naar ghcr.io, en — als secrets staan — deployt via SSH.
# Benodigde repository-instelling: Actions krijgen "Read and write" voor packages (Settings → Actions → General).
# Deploy-secrets: ófwel onder Settings → Environments → production (zelfde job gebruikt `environment: production` hieronder),
# ófwel repository secrets. Environment-secrets zonder `environment:` op de job zijn leeg in Actions.

name: Build & deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: finbar-cd-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io

jobs:
  image:
    name: Build & push image
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.meta.outputs.image }}
    steps:
      - uses: actions/checkout@v4

      - name: Image reference (ghcr = lowercase)
        id: meta
        run: |
          R=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          echo "image=${{ env.REGISTRY }}/$R:latest" >> "$GITHUB_OUTPUT"

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.image }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Push main → build image → deploy
  # VPS:        VPS_HOST, VPS_USER, VPS_SSH_KEY
  # Finbar .env: FINBAR_POSTGRES_PASSWORD, FINBAR_JWT_SECRET (min. 32 tekens)
  # Optioneel:   VPS_DEPLOY_PATH, GHCR_READ_TOKEN, VPS_SSH_KEY_PASSPHRASE, FINBAR_PUBLIC_APP_URL, FINBAR_RESEND_*
  deploy:
    name: Deploy to VPS
    needs: image
    runs-on: ubuntu-latest
    # Secrets in GitHub "production" environment — required for `secrets.*` to resolve
    environment: production
    if: needs.image.result == 'success' && github.ref == 'refs/heads/main'
    env:
      GHCR_READ_TOKEN: ${{ secrets.GHCR_READ_TOKEN }}
      GHCR_USER: ${{ github.actor }}
      # Worden doorgestuurd naar de VPS-shell (niet in script ingebed) voor .env
      FINBAR_POSTGRES_PASSWORD: ${{ secrets.FINBAR_POSTGRES_PASSWORD }}
      FINBAR_JWT_SECRET: ${{ secrets.FINBAR_JWT_SECRET }}
      FINBAR_PUBLIC_APP_URL: ${{ secrets.FINBAR_PUBLIC_APP_URL }}
      FINBAR_RESEND_API_KEY: ${{ secrets.FINBAR_RESEND_API_KEY }}
      FINBAR_RESEND_FROM: ${{ secrets.FINBAR_RESEND_FROM }}
    steps:
      - name: SSH — .env, pull, compose up
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          passphrase: ${{ secrets.VPS_SSH_KEY_PASSPHRASE }}
          script_stop: true
          envs: GHCR_READ_TOKEN,GHCR_USER,FINBAR_POSTGRES_PASSWORD,FINBAR_JWT_SECRET,FINBAR_PUBLIC_APP_URL,FINBAR_RESEND_API_KEY,FINBAR_RESEND_FROM
          script: |
            set -euo pipefail
            : "${FINBAR_POSTGRES_PASSWORD:?Zet repository secret FINBAR_POSTGRES_PASSWORD}"
            : "${FINBAR_JWT_SECRET:?Zet repository secret FINBAR_JWT_SECRET (min. 32 tekens)}"
            export PUBURL="${FINBAR_PUBLIC_APP_URL:-https://finbar.diversepersonality.com}"
            export FINBAR_IMAGE='${{ needs.image.outputs.image }}'
            DEPLOY_PATH='${{ secrets.VPS_DEPLOY_PATH }}'
            DEPLOY_PATH="${DEPLOY_PATH:-/opt/finbar}"
            cd "$DEPLOY_PATH"
            if [ -d .git ]; then
              git pull --ff-only
            fi
            if [ -n "${GHCR_READ_TOKEN:-}" ]; then
              echo "$GHCR_READ_TOKEN" | docker login ghcr.io -u "${GHCR_USER}" --password-stdin
            fi
            # .env via bestand in repo: inline heredoc faalt in appleboy (regels → python SyntaxError)
            bash deploy/generate-prod-env.sh
            docker pull "$FINBAR_IMAGE"
            # expliciet --env-file: interpolatie in compose (POSTGRES_*, etc.) pakt anders .env soms niet
            FINBAR_IMAGE="$FINBAR_IMAGE" docker compose --env-file .env -f deploy/compose.production.yaml up -d --remove-orphans
            docker image prune -f
            docker compose --env-file .env -f deploy/compose.production.yaml ps
